name: Build Noir SMC Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # 1. Checkout Code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java (Required for Android SDK)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Set up Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. Cache pip packages to speed up builds
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 5. Cache buildozer to avoid re-downloading Android SDK on each build
      - name: Cache .buildozer directory
        uses: actions/cache@v4
        with:
          path: mobile_app/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('mobile_app/buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      # 6. Install system dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ccache \
            git \
            libncurses5 \
            libstdc++6 \
            libssl-dev \
            zlib1g-dev \
            python3-dev \
            python3-pip \
            libffi-dev \
            libsqlite3-dev \
            zip \
            unzip \
            curl \
            wget \
            openjdk-17-jdk \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libgstreamer-plugins-base1.0-dev

      # 7. Install Buildozer and its Python dependencies
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0
          pip install cython==0.29.33

      # 8. Accept Android SDK licenses
      - name: Accept Android SDK licenses
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
        continue-on-error: true

      # 9. Build the APK
      - name: Build APK with Buildozer
        run: |
          cd mobile_app
          buildozer android debug 2>&1 | tail -200
        env:
          PYTHONPATH: ${{ github.workspace }}/mobile_app
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          PATH: /usr/local/lib/android/sdk/tools:$PATH

      # 10. Upload the final APK artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SovereignCore-APK
          path: mobile_app/bin/*.apk
          retention-days: 30
