<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR SOVEREIGN | v13.0 ELITE-SOVEREIGN</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020204;
            --panel: rgba(10, 10, 18, 0.9);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --gold: #ffb300;
            --danger: #ff0055;
            --success: #00ffaa;
            --text: #e0e0e5;
            --border: rgba(0, 242, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, #0a0a1a 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, #1a0a0a 0%, transparent 50%);
        }

        .layout {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            height: 100vh;
            padding: 15px;
            gap: 15px;
        }

        .glass {
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* SIDEBAR */
        .sidebar { padding: 25px; }
        .brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .section-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--gold);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-label::after { content: ''; flex: 1; height: 1px; background: rgba(255, 179, 0, 0.2); }

        .nav-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 8px;
            color: #aaa;
            cursor: pointer;
            text-align: left;
            font-size: 0.8rem;
            margin-bottom: 10px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-btn:hover {
            background: rgba(0, 242, 255, 0.08);
            border-color: var(--accent);
            color: #fff;
            transform: translateX(5px);
        }

        /* MAIN CONTENT */
        .main-viewport { display: grid; grid-template-rows: 1fr 200px; gap: 15px; }
        
        .vision-container { position: relative; flex: 1; background: #000; overflow: hidden; }
        .vision-img { width: 100%; height: 100%; object-fit: contain; }
        
        .scanline {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0,242,255,0.05) 50%, transparent 100%);
            animation: scan 6s linear infinite;
            pointer-events: none;
        }

        @keyframes scan { from { transform: translateY(-100%); } to { transform: translateY(100%); } }

        .action-bar { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }

        .action-btn {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--accent);
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* RIGHT PANEL: NEURAL HUB */
        .neural-hub { padding: 20px; }
        
        .log-list { flex: 1; overflow-y: auto; padding-right: 10px; }
        .log-item {
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #889;
        }
        .log-item span { color: var(--accent); }

        .catalyst-card {
            background: rgba(255, 179, 0, 0.05);
            border: 1px solid rgba(255, 179, 0, 0.2);
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .progress-bar {
            height: 6px; background: #111; border-radius: 3px; margin: 15px 0; overflow: hidden;
        }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }

        /* STATUS BADGE */
        .status-badge {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0, 255, 170, 0.1);
            color: var(--success);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            display: flex; align-items: center; gap: 8px;
            border: 1px solid var(--success);
        }

        .status-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); }

    </style>
</head>
<body>

    <div class="layout">
        <!-- SIDEBAR -->
        <div class="glass sidebar">
            <div class="brand">NOIR SOVEREIGN</div>
            
            <div class="section-label">STRATEGIC COMMAND</div>
            <button class="nav-btn" onclick="sendCmd('screenshot')">📸 SCAN VISION STREAM</button>
            <button class="nav-btn" onclick="sendCmd('ui_dump')">🧬 RE-MAP UI STRUCTURE</button>
            <button class="nav-btn" onclick="sendCmd('stealth', {enabled: true})">🥷 ENGAGE STEALTH MODE</button>
            <button class="nav-btn" onclick="sendCmd('stealth', {enabled: false})">👁️ DISENGAGE STEALTH</button>

            <div class="section-label" style="margin-top: 30px;">DEVICE MANAGEMENT</div>
            <button class="nav-btn" onclick="sendCmd('battery')">⚡ POWER DIAGNOSTICS</button>
            <button class="nav-btn" onclick="triggerHealing()">🩹 TRIGGER SELF-HEALING</button>
            <button class="nav-btn" onclick="sendCmd('info')">ℹ️ AGENT MANIFESTO</button>
        </div>

        <!-- MAIN AREA -->
        <div class="main-viewport">
            <div class="glass vision-container">
                <div class="status-badge">
                    <div class="status-dot"></div> SYNC ACTIVE [v13.0]
                </div>
                <div class="scanline"></div>
                <img id="vision-feed" class="vision-img" src="/noir_screen.png" alt="Vision Feed">
            </div>

            <div class="glass action-bar">
                <button class="action-btn" onclick="sendCmd('tap', {x: 500, y: 1000})">CENTER TAP</button>
                <button class="action-btn" onclick="sendCmd('keyevent', {key: 26})">POWER TOGGLE</button>
                <button class="action-btn" onclick="sendCmd('keyevent', {key: 3})">HOME</button>
                <button class="action-btn" onclick="sendCmd('keyevent', {key: 4})">BACK</button>
                <button class="action-btn" onclick="showPrompt()" style="background: rgba(255, 179, 0, 0.1); color: var(--gold); border-color: var(--gold);">EXECUTOR PROMPT</button>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="glass neural-hub">
            <div class="section-label">NEURAL EVOLUTION LOG</div>
            <div class="log-list" id="log-list">
                <div class="log-item"><span>[21:49:01]</span> Sovereign v13.0 ELITE-SOVEREIGN standing by.</div>
            </div>

            <div class="catalyst-card">
                <div class="section-label" style="margin-bottom: 10px;">SOVEREIGN CATALYST</div>
                <div style="font-size: 1.5rem; font-weight: 700; color: #fff;" id="cat-growth">0.0%</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="cat-bar"></div>
                </div>
                <div style="font-size: 0.65rem; color: #666; font-style: italic;" id="cat-status">Absorbing local intelligence...</div>
            </div>
        </div>
    </div>

    <script>
        const API = "/api";

        async function sendCmd(type, params={}) {
            addLog(`Initiating: ${type.toUpperCase()}...`, 'PROCESS');
            try {
                const res = await fetch(`${API}/command`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: { type, ...params }, description: type })
                });
                const data = await res.json();
                addLog(`Command broadcasted: ${data.command_id}`, 'SUCCESS');
            } catch (e) {
                addLog(`Broadcast failed: ${e}`, 'ERROR');
            }
        }

        function addLog(msg, tag = 'INFO') {
            const list = document.getElementById('log-list');
            const div = document.createElement('div');
            div.className = 'log-item';
            const now = new Date().toLocaleTimeString();
            div.innerHTML = `<span>[${now}]</span> [${tag}] ${msg}`;
            list.prepend(div);
        }

        function showPrompt() {
            const cmd = prompt("Enter Shell Command:");
            if (cmd) sendCmd('shell', { cmd });
        }

        function triggerHealing() {
            sendCmd('shell', {cmd: 'pm trim-caches 999G'});
            addLog("Self-Healing procedure initiated.", "HEAL");
        }

        async function updateStatus() {
            try {
                // 1. Update Screenshot (Real-time Share)
                const r_assets = await fetch(`/api/assets`);
                const d_assets = await r_assets.json();
                if(d_assets.assets && d_assets.assets.length > 0) {
                    const latest_key = d_assets.assets[0].key;
                    document.getElementById('vision-feed').src = `/api/asset/${latest_key}`;
                }

                // 2. Update Catalyst
                const r = await fetch(`/api/status`);
                const d = await r.json();
                
                if(d.catalyst) {
                    const growth = (d.catalyst.growth_level * 100).toFixed(1);
                    document.getElementById('cat-growth').innerText = `${growth}%`;
                    document.getElementById('cat-bar').style.width = `${growth}%`;
                    if(d.catalyst.growth_level >= 0.8) {
                        document.getElementById('cat-status').innerText = "ELITE MISSION READY";
                        document.getElementById('cat-status').style.color = "var(--success)";
                    }
                }
            } catch(e) {}
        }

        setInterval(updateStatus, 10000);
    </script>
</body>
</html>
